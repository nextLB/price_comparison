{% extends 'core/base.html' %}
{% block title %}{% if department %}编辑{% else %}新增{% endif %}部门{% endblock %}

{% block content %}
<h2>{% if department %}编辑{% else %}新增{% endif %}部门</h2>
<form method="post" class="col-md-6">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">部门名称</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">部门编码</label>
        <input type="text" name="code" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">上级部门</label>
        <select name="parent" class="form-select">
            <option value="">无</option>
            {% for dept in departments %}
            <option value="{{ dept.id }}">{{ dept.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">负责人</label>
        <select name="manager" class="form-select">
            <option value="">请选择</option>
            {% for u in users %}
            <option value="{{ u.id }}">{{ u.username }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{% url 'department_list' %}" class="btn btn-secondary">返回</a>
</form>
{% endblock %}
