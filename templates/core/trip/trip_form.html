{% extends 'core/base.html' %}
{% block title %}申请出差{% endblock %}

{% block content %}
<h2>申请出差</h2>
<form method="post" class="col-md-8">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">项目</label>
        <select name="project" class="form-select">
            <option value="">请选择</option>
            {% for p in projects %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">出差目的地 *</label>
        <input type="text" name="destination" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">出差目的 *</label>
        <textarea name="purpose" class="form-control" rows="3" required></textarea>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">开始日期 *</label>
            <input type="date" name="start_date" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">结束日期 *</label>
            <input type="date" name="end_date" class="form-control" required>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">预计费用</label>
        <input type="number" name="estimated_cost" class="form-control" value="0">
    </div>
    <div class="mb-3">
        <label class="form-label">备注</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">提交申请</button>
    <a href="{% url 'trip_list' %}" class="btn btn-secondary">返回</a>
</form>
{% endblock %}
