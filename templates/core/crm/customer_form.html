{% extends 'core/base.html' %}
{% block title %}{% if customer %}编辑{% else %}新增{% endif %}客户{% endblock %}

{% block content %}
<h2>{% if customer %}编辑{% else %}新增{% endif %}客户</h2>
<form method="post" class="col-md-8">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">客户名称 *</label>
            <input type="text" name="name" class="form-control" value="{{ customer.name|default:'' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">客户编码 *</label>
            <input type="text" name="code" class="form-control" value="{{ customer.code|default:'' }}" required>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">行业</label>
            <input type="text" name="industry" class="form-control" value="{{ customer.industry|default:'' }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">客户级别</label>
            <input type="text" name="level" class="form-control" value="{{ customer.level|default:'' }}">
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">状态</label>
            <select name="status" class="form-select">
                <option value="潜在" {% if customer.status == '潜在' %}selected{% endif %}>潜在</option>
                <option value="跟进中" {% if customer.status == '跟进中' %}selected{% endif %}>跟进中</option>
                <option value="商机" {% if customer.status == '商机' %}selected{% endif %}>商机</option>
                <option value="成交" {% if customer.status == '成交' %}selected{% endif %}>成交</option>
                <option value="流失" {% if customer.status == '流失' %}selected{% endif %}>流失</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">客户来源</label>
            <select name="source" class="form-select">
                <option value="">请选择</option>
                <option value="推荐" {% if customer.source == '推荐' %}selected{% endif %}>推荐</option>
                <option value="电话营销" {% if customer.source == '电话营销' %}selected{% endif %}>电话营销</option>
                <option value="展会" {% if customer.source == '展会' %}selected{% endif %}>展会</option>
                <option value="网络推广" {% if customer.source == '网络推广' %}selected{% endif %}>网络推广</option>
            </select>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">地址</label>
        <input type="text" name="address" class="form-control" value="{{ customer.address|default:'' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">网站</label>
        <input type="text" name="website" class="form-control" value="{{ customer.website|default:'' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">描述</label>
        <textarea name="description" class="form-control" rows="3">{{ customer.description|default:'' }}</textarea>
    </div>
    
    <h4 class="mt-4">主要联系人</h4>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">姓名</label>
            <input type="text" name="contact_name" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">职位</label>
            <input type="text" name="contact_position" class="form-control">
        </div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">电话</label>
            <input type="text" name="contact_phone" class="form-control">
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">手机</label>
            <input type="text" name="contact_mobile" class="form-control">
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">邮箱</label>
            <input type="email" name="contact_email" class="form-control">
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{% url 'customer_list' %}" class="btn btn-secondary">返回</a>
</form>
{% endblock %}
