{% extends 'core/base.html' %}
{% block title %}{% if followup %}编辑{% else %}新增{% endif %}跟进{% endblock %}

{% block content %}
<h2>{% if followup %}编辑{% else %}新增{% endif %}跟进</h2>
<form method="post" class="col-md-8">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">客户 *</label>
        <select name="customer" class="form-select" required>
            {% for c in customers %}
            <option value="{{ c.id }}" {% if followup.customer_id == c.id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">项目</label>
        <select name="project" class="form-select">
            <option value="">请选择</option>
            {% for p in projects %}
            <option value="{{ p.id }}" {% if followup.project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">跟进方式</label>
            <select name="follow_type" class="form-select">
                <option value="电话" {% if followup.follow_type == '电话' %}selected{% endif %}>电话</option>
                <option value="拜访" {% if followup.follow_type == '拜访' %}selected{% endif %}>拜访</option>
                <option value="邮件" {% if followup.follow_type == '邮件' %}selected{% endif %}>邮件</option>
                <option value="会议" {% if followup.follow_type == '会议' %}selected{% endif %}>会议</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">状态</label>
            <select name="status" class="form-select">
                <option value="待处理" {% if followup.status == '待处理' %}selected{% endif %}>待处理</option>
                <option value="进行中" {% if followup.status == '进行中' %}selected{% endif %}>进行中</option>
                <option value="已完成" {% if followup.status == '已完成' %}selected{% endif %}>已完成</option>
            </select>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">跟进主题 *</label>
        <input type="text" name="subject" class="form-control" value="{{ followup.subject|default:'' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">跟进内容 *</label>
        <textarea name="content" class="form-control" rows="4" required>{{ followup.content|default:'' }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">下一步行动</label>
        <textarea name="next_action" class="form-control" rows="2">{{ followup.next_action|default:'' }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">下次跟进日期</label>
        <input type="date" name="next_date" class="form-control" value="{{ followup.next_date|default:'' }}">
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{% url 'followup_list' %}" class="btn btn-secondary">返回</a>
</form>
{% endblock %}
