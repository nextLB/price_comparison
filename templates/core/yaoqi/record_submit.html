{% extends 'core/base.html' %}

{% block title %}挂网价申报{% endblock %}

{% block sidebar %}
<div class="p-3"><h5>导航菜单</h5></div>
<a href="{% url 'company_drug_list' %}">药品挂网价查询</a>
<a href="{% url 'company_record_submit' %}">挂网价申报</a>
<a href="{% url 'company_record_list' %}">申报记录查询</a>
{% endblock %}

{% block content %}
<h2>挂网价申报</h2>
<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">数据年月</label>
                <input type="month" name="record_date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">选择Excel文件</label>
                <input type="file" name="excel_file" class="form-control" accept=".xlsx,.xls" required>
            </div>
            <div class="alert alert-info">
                <p><strong>Excel文件需包含以下列：</strong></p>
                <ul>
                    <li>统编代码（必填）</li>
                    <li>申报价（必填）</li>
                </ul>
            </div>
            <button type="submit" class="btn btn-primary">提交</button>
            <a href="{% url 'company_record_list' %}" class="btn btn-secondary">返回</a>
        </form>
    </div>
</div>
{% endblock %}
