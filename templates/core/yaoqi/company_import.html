{% extends 'core/base.html' %}

{% block title %}导入药企{% endblock %}

{% block sidebar %}
<div class="p-3"><h5>导航菜单</h5></div>
<a href="{% url 'drug_section_drug_list' %}">药品挂网价查询</a>
<a href="{% url 'drug_section_review_list' %}">价格审核</a>
<a href="{% url 'drug_section_company_list' %}">药企列表</a>
<a href="{% url 'drug_section_company_import' %}">导入药企</a>
{% endblock %}

{% block content %}
<h2>导入药企编码关系</h2>
<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">选择Excel文件</label>
                <input type="file" name="excel_file" class="form-control" accept=".xlsx,.xls" required>
            </div>
            <div class="alert alert-info">
                <p><strong>Excel文件需包含以下列：</strong></p>
                <ul>
                    <li>机构编码（必填）</li>
                    <li>企业名称（必填）</li>
                </ul>
            </div>
            <button type="submit" class="btn btn-primary">导入</button>
            <a href="{% url 'drug_section_company_list' %}" class="btn btn-secondary">返回</a>
        </form>
    </div>
</div>
{% endblock %}
